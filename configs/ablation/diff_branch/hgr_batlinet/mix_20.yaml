model:
    name: 'HGRBatLiNetRULPredictor'
    in_channels: 6
    channels: 32
    input_height: 20
    input_width: 1000
    epochs: 1000
    train_batch_size: 32
    test_batch_size: 1
    train_support_size_min: 4
    train_support_size: 8
    test_support_size: 32
    gradient_accumulation_steps: 4
    evaluate_freq: 100
    checkpoint_freq: 2000
    filter_cycles: False
    hierarchy_channels: 64
    hierarchy_heads: 4
    hierarchy_cycle_layers: 2
    relation_layers: 1
    relation_mlp_ratio: 2
    head_hidden_channels: 96
    model_dropout: 0.1
    aggregation_temperature: 1.0
    aggregation_robust_scale: 2.5
    aggregation_uncertainty_penalty: 0.25
    use_bidirectional_relation: True
    use_gain_aware_weights: True
    use_adaptive_gate: True
    fixed_gate: 0.5
    final_loss_weight: 1.0
    ori_loss_weight: 0.3
    pair_delta_loss_weight: 0.3
    gain_loss_weight: 0.1
    ranking_loss_weight: 0.1
    uncertainty_loss_weight: 0.05
    ranking_margin: 0.05
    max_grad_norm: 5.0
train_test_split:
    name: 'MIX20TrainTestSplitter'
    cell_data_path:
        - 'data/processed/CALCE'
        - 'data/processed/RWTH'
        - 'data/processed/UL_PUR'
        - 'data/processed/SNL'
        - 'data/processed/MATR'
        - 'data/processed/HUST'
        - 'data/processed/HNEI'
feature:
    name: 'BatLiNetFeatureExtractor'
    max_cycle_index: 19
    cycle_to_drop: 10
    smooth_features: False
label:
    name: 'RULLabelAnnotator'
    eol_soh: 0.9
label_transformation:
    name: 'SequentialDataTransformation'
    transformations:
        - name: 'LogScaleDataTransformation'
        - name: 'ZScoreDataTransformation'
